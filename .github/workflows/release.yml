name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate extension files
        run: |
          node --check content.js
          node - <<'NODE'
          const fs = require("fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const requiredFiles = [
            "manifest.json",
            "content.js",
            ...Object.values(manifest.icons || {}),
          ];

          for (const file of requiredFiles) {
            if (!fs.existsSync(file)) {
              throw new Error(`Missing required package file: ${file}`);
            }
          }

          if (manifest.manifest_version !== 3) {
            throw new Error("manifest_version must be 3");
          }

          const tagName = process.env.GITHUB_REF_NAME;
          const tagVersion = tagName?.startsWith("v") ? tagName.slice(1) : null;

          if (tagVersion && manifest.version !== tagVersion) {
            throw new Error(`manifest.version (${manifest.version}) must match tag ${tagName}`);
          }
          NODE

      - name: Build ZIP
        run: |
          mkdir -p dist
          zip -r "dist/shorts-speed-controller-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            content.js \
            icons
          unzip -l "dist/shorts-speed-controller-${GITHUB_REF_NAME}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: shorts-speed-controller-${{ github.ref_name }}
          path: dist/shorts-speed-controller-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP_PATH="dist/shorts-speed-controller-${GITHUB_REF_NAME}.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ZIP_PATH}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ZIP_PATH}" \
              --title "Shorts Speed Controller ${GITHUB_REF_NAME}" \
              --notes "Chrome extension package for ${GITHUB_REF_NAME}."
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload to Chrome Web Store
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_ITEM_ID: ${{ secrets.CWS_ITEM_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          set -euo pipefail

          ZIP_PATH="dist/shorts-speed-controller-${GITHUB_REF_NAME}.zip"

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @"${ZIP_PATH}" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_ITEM_ID}:upload"

      - name: Submit Chrome Web Store item
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CWS_ITEM_ID: ${{ secrets.CWS_ITEM_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          set -euo pipefail

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"publishType":"DEFAULT_PUBLISH","skipReview":false,"blockOnWarnings":true}' \
            "https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_ITEM_ID}:publish"

  deploy-privacy:
    name: Deploy Privacy Policy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
